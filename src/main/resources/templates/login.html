<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login CRUD Web</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#0f172a,#1e293b);
        }

        .login-box{
            width:380px;
            background:#111827;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 25px rgba(0,0,0,0.4);
            text-align:center;
        }

        h1{
            color:white;
            margin-bottom:10px;
        }

        p{
            color:#94a3b8;
            margin-bottom:30px;
        }

        .input-box{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:8px;
            background:#1f2937;
            color:white;
            font-size:15px;
        }

        input::placeholder{
            color:#94a3b8;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .footer{
            margin-top:20px;
            color:#64748b;
            font-size:13px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>CRUD WEB 🚀</h1>
    <p>Login Administrativo</p>

    <form action="/login" method="post">
        <div class="input-box">
            <input type="text" name="nombre" placeholder="Usuario" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Contraseña" required>
        </div>

        <button type="submit">Entrar</button>
    </form>

    <h3 th:text="${mensaje}" style="color:white; margin-top:15px;"></h3>

    <div class="footer">
        Spring Boot + SQL Server
    </div>
</div>

</body>
</html>
